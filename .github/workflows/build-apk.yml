name: Build Debug APK (manual dispatch)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --stacktrace \
            -Dorg.gradle.jvmargs='-Xmx5g -XX:MaxMetaspaceSize=512m' \
            -Pandroid.useAndroidX=true \
            -PMYAPP_UPLOAD_STORE_FILE=/dev/null \
            -PMYAPP_UPLOAD_STORE_PASSWORD= \
            -PMYAPP_UPLOAD_KEY_ALIAS= \
            -PMYAPP_UPLOAD_KEY_PASSWORD=

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Locate APK
        id: locate_apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "APK found: $APK"

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: grapheneos-ai-debug-${{ steps.version.outputs.version }}-${{ github.sha }}
          path: ${{ steps.locate_apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Create test release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test-v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Test APK v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body: |
            ## 🔬 Test APK — auto-generated

            **Version:** ${{ steps.version.outputs.version }}
            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Generated by:** DeepSeek V4 Pro (Extra High) via OpenClaw

            ### Changes included
            - 18 bug fixes across 15 files (+150/-132 lines)
            - See PR [#9](https://github.com/mx37/grapheneos-ai/pull/9) for details

            ### ⚠️ Notes
            - Unsigned debug APK — sideload only
            - Cloud AI (OpenRouter) works after adding API key in Settings
          files: ${{ steps.locate_apk.outputs.apk_path }}
          draft: false
          prerelease: true
          generate_release_notes: false